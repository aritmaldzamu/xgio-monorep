site_name: XGIO - Sistema de Rastreo GPS
site_description: Documentación oficial del proyecto XGIO para personas con discapacidad visual.
site_author: Aritmaldzamu
repo_url: https://github.com/aritmaldzamu/xgio-monorep

theme:
  name: material
  logo: assets/imagenes/logo_ibero.png
  favicon: assets/imagenes/logo_ibero.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Inicio: index.md
  - Guía de Instalación: instalacion.md
  - Componentes:
    - Aplicación Móvil (App): app.md
    - Panel de Administración: dashboard.md
    - Servidor (Backend): backend.md
    - Hardware (Firmware): firmware.md
  - Laboratorio de Código: codigos.md
  - Resultados y Pruebas:
    - Análisis GPS: pruebas_gps.md
  - Documentación: descargas.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
